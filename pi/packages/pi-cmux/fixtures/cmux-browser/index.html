<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cmux-browser-fixture</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        line-height: 1.5;
      }

      main {
        max-width: 720px;
      }

      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        margin: 12px 0;
      }

      #name {
        min-width: 220px;
      }

      #status {
        margin-top: 12px;
        padding: 8px 12px;
        border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
        border-radius: 8px;
      }

      #hidden {
        display: none;
      }

      #scroller {
        margin-top: 20px;
        height: 120px;
        overflow: auto;
        border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
        border-radius: 8px;
        padding: 12px;
      }

      .spacer {
        height: 280px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="page-title">cmux-browser-fixture</h1>
      <p id="ready">ready</p>

      <label for="name">Name</label>
      <div class="row">
        <input id="name" name="name" type="text" placeholder="enter text" />
        <button id="btn" type="button">Update status</button>
        <button id="log-btn" type="button">Emit logs</button>
      </div>

      <div id="status" role="status">ready</div>

      <p>
        <a id="next" href="./page-2.html">Next page</a>
      </p>

      <div id="visible">visible element</div>
      <div id="hidden">hidden element</div>

      <div id="scroller">
        <p>scroll top</p>
        <div class="spacer"></div>
        <div id="bottom">bottom target</div>
      </div>
    </main>

    <script>
      const input = document.querySelector("#name");
      const status = document.querySelector("#status");
      const updateStatus = () => {
        status.textContent = input.value || "hello";
      };

      function emitLogs() {
        console.log("cmux-console-entry");
        queueMicrotask(() => {
          Promise.reject(new Error("cmux-browser-boom"));
        });
      }

      function emitConsoleAndError() {
        emitLogs();
      }

      document.querySelector("#btn").addEventListener("click", updateStatus);
      document.querySelector("#log-btn").addEventListener("click", emitLogs);

      window.emitLogs = emitLogs;
      window.emitConsoleAndError = emitConsoleAndError;
    </script>
  </body>
</html>

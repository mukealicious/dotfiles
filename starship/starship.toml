# Starship prompt ‚Äî minimal, informative
# Docs: https://starship.rs/config/

# Git is usually fast with fsmonitor enabled, but cold repo checks can still
# briefly exceed Starship's 500ms default and emit noisy timeout warnings.
command_timeout = 1500

format = "$directory$git_branch$git_status$line_break$character"

[character]
success_symbol = "[‚ùØ](bold green)"
error_symbol = "[‚ùØ](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = false

[git_branch]
format = "on [$symbol$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'

[golang]
symbol = " "

[lua]
symbol = " "

[nodejs]
symbol = " "

[python]
symbol = " "

[rust]
symbol = " "

[package]
disabled = true
